<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Love Compatibility Test ❤️</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* =============================================
       CSS VARIABLES & RESET
    ============================================= */
    :root {
      --rose:      #e8637a;
      --rose-deep: #c2435a;
      --rose-soft: #f9dde2;
      --blush:     #fceef1;
      --lavender:  #ede4f7;
      --violet:    #9b6fc8;
      --violet-deep:#7248a6;
      --cream:     #fff9fb;
      --text:      #2d1f26;
      --text-muted:#7a5c66;
      --card-bg:   #ffffff;
      --border:    rgba(232,99,122,.18);
      --shadow:    0 8px 40px rgba(194,67,90,.10);
      --shadow-lg: 0 20px 60px rgba(194,67,90,.16);
      --radius:    20px;
      --radius-sm: 12px;
      --transition: .35s cubic-bezier(.4,0,.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      overflow-x: hidden;
    }

    /* =============================================
       FLOATING HEARTS BACKGROUND
    ============================================= */
    #hearts-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .heart-particle {
      position: absolute;
      bottom: -60px;
      font-size: 1.4rem;
      opacity: 0;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(0deg) scale(1);   opacity: 0; }
      10%  { opacity: .45; }
      90%  { opacity: .2; }
      100% { transform: translateY(-110vh) rotate(25deg) scale(.6); opacity: 0; }
    }

    /* =============================================
       MESH GRADIENT BLOBS
    ============================================= */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 { width: 500px; height: 500px; background: rgba(232,99,122,.18); top: -120px; left: -120px; animation: drift 18s ease-in-out infinite alternate; }
    .blob-2 { width: 400px; height: 400px; background: rgba(155,111,200,.14); bottom: -80px; right: -80px; animation: drift 22s ease-in-out infinite alternate-reverse; }
    .blob-3 { width: 300px; height: 300px; background: rgba(249,221,226,.6); top: 40%; left: 50%; animation: drift 15s ease-in-out infinite alternate; }
    @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(30px,20px) scale(1.08); } }

    /* =============================================
       MAIN CARD
    ============================================= */
    .card {
      position: relative;
      z-index: 1;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 560px;
      padding: 2.8rem 2.4rem;
      transition: var(--transition);
    }

    /* =============================================
       SCREEN VISIBILITY
    ============================================= */
    .screen { display: none; animation: fadeSlideIn .45s ease; }
    .screen.active { display: block; }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* =============================================
       HERO / INTRO SCREEN
    ============================================= */
    .logo-ring {
      width: 86px; height: 86px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--rose-soft), var(--lavender));
      display: flex; align-items: center; justify-content: center;
      font-size: 2.6rem;
      margin: 0 auto 1.4rem;
      box-shadow: 0 4px 24px rgba(232,99,122,.2);
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 4px 24px rgba(232,99,122,.2); }
      50%      { box-shadow: 0 4px 36px rgba(232,99,122,.45); }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 5vw, 2.1rem);
      text-align: center;
      background: linear-gradient(135deg, var(--rose-deep), var(--violet));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.25;
      margin-bottom: .45rem;
    }

    .subtitle {
      text-align: center;
      font-size: .95rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
      font-weight: 300;
    }

    /* =============================================
       FORM INPUTS
    ============================================= */
    .form-group {
      margin-bottom: 1.1rem;
    }
    .form-group label {
      display: block;
      font-size: .82rem;
      font-weight: 500;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: .4rem;
    }
    .form-group input {
      width: 100%;
      padding: .82rem 1.1rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      color: var(--text);
      background: var(--blush);
      transition: border-color var(--transition), box-shadow var(--transition);
      outline: none;
    }
    .form-group input:focus {
      border-color: var(--rose);
      box-shadow: 0 0 0 4px rgba(232,99,122,.12);
      background: #fff;
    }
    .form-group input::placeholder { color: #c5a0aa; }

    /* =============================================
       BUTTONS
    ============================================= */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      padding: .9rem 2rem;
      border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: var(--transition);
      text-decoration: none;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--rose), var(--violet));
      color: #fff;
      width: 100%;
      margin-top: 1rem;
      box-shadow: 0 6px 24px rgba(232,99,122,.35);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(232,99,122,.45); }
    .btn-primary:active { transform: translateY(0); }

    .btn-ghost {
      background: transparent;
      color: var(--rose);
      border: 1.5px solid var(--rose);
      font-size: .9rem;
      padding: .65rem 1.4rem;
    }
    .btn-ghost:hover { background: var(--rose-soft); }

    .btn-share {
      background: var(--lavender);
      color: var(--violet-deep);
      border: 1.5px solid rgba(155,111,200,.25);
      font-size: .9rem;
      padding: .65rem 1.4rem;
    }
    .btn-share:hover { background: #e2d4f3; }

    .btn-row {
      display: flex;
      gap: .7rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 1.4rem;
    }

    /* =============================================
       PROGRESS BAR
    ============================================= */
    .progress-wrap {
      margin-bottom: 1.6rem;
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: .78rem;
      color: var(--text-muted);
      margin-bottom: .4rem;
    }
    .progress-bar-track {
      height: 6px;
      background: var(--rose-soft);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--rose), var(--violet));
      border-radius: 99px;
      transition: width .6s cubic-bezier(.4,0,.2,1);
    }

    /* =============================================
       QUESTION CARD
    ============================================= */
    .question-label {
      font-size: .75rem;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--rose);
      margin-bottom: .55rem;
    }
    .question-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.05rem, 3vw, 1.25rem);
      line-height: 1.45;
      color: var(--text);
      margin-bottom: 1.4rem;
    }

    .options-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: .6rem;
    }
    .option-btn {
      width: 100%;
      text-align: left;
      padding: .85rem 1.1rem;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      background: var(--blush);
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      color: var(--text);
      cursor: pointer;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }
    .option-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(232,99,122,.08), rgba(155,111,200,.08));
      opacity: 0;
      transition: opacity var(--transition);
    }
    .option-btn:hover { border-color: var(--rose); transform: translateX(4px); }
    .option-btn:hover::before { opacity: 1; }
    .option-btn.selected {
      border-color: var(--rose);
      background: var(--rose-soft);
      font-weight: 500;
      transform: translateX(4px);
    }
    .option-btn.selected::before { opacity: 1; }

    .nav-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 1.2rem;
    }

    /* =============================================
       LOADING SCREEN
    ============================================= */
    #screen-loading { text-align: center; padding: 1rem 0; }

    .heart-loader {
      display: flex;
      gap: .4rem;
      justify-content: center;
      margin-bottom: 1.4rem;
    }
    .heart-dot {
      width: 14px; height: 14px;
      background: var(--rose);
      border-radius: 50%;
      animation: bounce .9s ease-in-out infinite;
    }
    .heart-dot:nth-child(2) { background: var(--violet); animation-delay: .15s; }
    .heart-dot:nth-child(3) { background: var(--rose-deep); animation-delay: .3s; }
    @keyframes bounce {
      0%,80%,100% { transform: scale(1); }
      40%          { transform: scale(1.5); }
    }

    .loading-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      color: var(--text-muted);
      font-style: italic;
      animation: fadeText 2s ease-in-out infinite;
    }
    @keyframes fadeText {
      0%,100% { opacity: .6; }
      50%      { opacity: 1; }
    }

    /* =============================================
       RESULTS SCREEN
    ============================================= */
    #screen-results { text-align: center; }

    .couple-names {
      font-size: .9rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
      font-style: italic;
    }

    .score-ring-wrap {
      position: relative;
      width: 160px; height: 160px;
      margin: 0 auto 1.4rem;
    }
    .score-ring-svg { transform: rotate(-90deg); }
    .score-ring-track { fill: none; stroke: var(--rose-soft); stroke-width: 10; }
    .score-ring-fill  { fill: none; stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 1.4s cubic-bezier(.4,0,.2,1); }
    .score-number {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .score-pct {
      font-family: 'Playfair Display', serif;
      font-size: 2.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--rose-deep), var(--violet));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }
    .score-label-sm { font-size: .72rem; color: var(--text-muted); letter-spacing: .06em; text-transform: uppercase; }

    .result-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.55rem;
      margin-bottom: .6rem;
      color: var(--text);
    }
    .result-msg {
      font-size: .96rem;
      color: var(--text-muted);
      line-height: 1.65;
      max-width: 360px;
      margin: 0 auto 1.2rem;
    }

    /* Score category badge */
    .score-badge {
      display: inline-block;
      padding: .35rem 1rem;
      border-radius: 50px;
      font-size: .82rem;
      font-weight: 500;
      margin-bottom: 1.2rem;
    }
    .badge-perfect  { background: #fce4ec; color: #c2185b; }
    .badge-strong   { background: #fce4ff; color: #7b1fa2; }
    .badge-effort   { background: #fffde7; color: #f57f17; }
    .badge-opposite { background: #fbe9e7; color: #bf360c; }

    /* Breakdown bars */
    .breakdown {
      background: var(--blush);
      border-radius: var(--radius-sm);
      padding: 1.1rem 1.2rem;
      margin-top: 1.2rem;
      text-align: left;
    }
    .breakdown-title {
      font-size: .78rem;
      font-weight: 500;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: .9rem;
    }
    .bd-row { margin-bottom: .65rem; }
    .bd-meta { display: flex; justify-content: space-between; font-size: .8rem; color: var(--text-muted); margin-bottom: .25rem; }
    .bd-track { height: 6px; background: #f0d4da; border-radius: 99px; overflow: hidden; }
    .bd-fill   { height: 100%; border-radius: 99px; transition: width 1.2s cubic-bezier(.4,0,.2,1); }

    /* =============================================
       TOAST
    ============================================= */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--text);
      color: #fff;
      padding: .7rem 1.4rem;
      border-radius: 50px;
      font-size: .87rem;
      z-index: 999;
      transition: transform .35s cubic-bezier(.4,0,.2,1);
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* =============================================
       SPARKLE BURST (result reveal)
    ============================================= */
    .sparkle {
      position: fixed;
      pointer-events: none;
      z-index: 500;
      font-size: 1.4rem;
      animation: sparkle-pop .8s ease forwards;
    }
    @keyframes sparkle-pop {
      0%   { transform: scale(0) rotate(0);   opacity: 1; }
      60%  { transform: scale(1.3) rotate(20deg); opacity: 1; }
      100% { transform: scale(.8) rotate(-10deg) translateY(-40px); opacity: 0; }
    }

    /* =============================================
       DIVIDER
    ============================================= */
    .divider {
      display: flex; align-items: center; gap: .8rem;
      color: var(--text-muted); font-size: .8rem;
      margin: 1.4rem 0;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px; background: var(--border);
    }

    /* =============================================
       RESPONSIVE
    ============================================= */
    @media (max-width: 480px) {
      .card { padding: 2rem 1.5rem; }
      .btn-row { flex-direction: column; align-items: stretch; }
      .btn-row .btn { width: 100%; }
    }
  </style>
</head>
<body>

  <!-- Decorative blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <!-- Floating hearts canvas -->
  <div id="hearts-bg"></div>

  <!-- Toast notification -->
  <div class="toast" id="toast">Copied to clipboard! 💌</div>

  <!-- ============================================
       MAIN CARD
  ============================================= -->
  <div class="card" id="main-card">

    <!-- ── SCREEN 1: INTRO ── -->
    <div class="screen active" id="screen-intro">
      <div class="logo-ring">💖</div>
      <h1>Love Compatibility Test</h1>
      <p class="subtitle">Discover how well your hearts align — 12 questions, endless insight.</p>

      <div class="form-group">
        <label for="name-a">Partner A ✨</label>
        <input type="text" id="name-a" placeholder="Enter first name…" maxlength="24" autocomplete="off" />
      </div>
      <div class="form-group">
        <label for="name-b">Partner B 🌹</label>
        <input type="text" id="name-b" placeholder="Enter first name…" maxlength="24" autocomplete="off" />
      </div>

      <button class="btn btn-primary" id="btn-start" onclick="startTest()">
        Begin Your Journey &rarr;
      </button>
    </div>

    <!-- ── SCREEN 2: QUIZ ── -->
    <div class="screen" id="screen-quiz">
      <div class="progress-wrap">
        <div class="progress-meta">
          <span id="q-count">Question 1 of 12</span>
          <span id="q-category">💬 Communication</span>
        </div>
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
        </div>
      </div>

      <p class="question-label" id="q-for">For Partner A</p>
      <p class="question-text" id="q-text">Loading…</p>

      <ul class="options-list" id="options-list"></ul>

      <div class="nav-row">
        <button class="btn btn-primary" id="btn-next" onclick="nextStep()" style="width:auto;padding:.75rem 1.8rem;font-size:.93rem;" disabled>
          Next &rarr;
        </button>
      </div>
    </div>

    <!-- ── SCREEN 3: LOADING ── -->
    <div class="screen" id="screen-loading">
      <div class="logo-ring" style="margin-top:.5rem;">🔮</div>
      <div class="heart-loader">
        <div class="heart-dot"></div>
        <div class="heart-dot"></div>
        <div class="heart-dot"></div>
      </div>
      <p class="loading-text" id="loading-msg">Reading the stars…</p>
    </div>

    <!-- ── SCREEN 4: RESULTS ── -->
    <div class="screen" id="screen-results">
      <p class="couple-names" id="couple-names-display"></p>

      <div class="score-ring-wrap">
        <svg class="score-ring-svg" width="160" height="160" viewBox="0 0 160 160">
          <circle class="score-ring-track" cx="80" cy="80" r="68"/>
          <circle class="score-ring-fill" id="ring-fill" cx="80" cy="80" r="68"
                  stroke-dasharray="427" stroke-dashoffset="427"/>
        </svg>
        <div class="score-number">
          <span class="score-pct" id="score-pct">0%</span>
          <span class="score-label-sm">compatible</span>
        </div>
      </div>

      <div class="score-badge" id="score-badge"></div>
      <h2 class="result-title" id="result-title"></h2>
      <p class="result-msg" id="result-msg"></p>

      <div class="breakdown" id="breakdown-section">
        <p class="breakdown-title">Compatibility Breakdown</p>
        <div id="breakdown-bars"></div>
      </div>

      <div class="btn-row">
        <button class="btn btn-ghost" onclick="resetTest()">Try Again 🔄</button>
        <button class="btn btn-share" onclick="shareResult()">Share Result 💌</button>
      </div>
    </div>

  </div><!-- /.card -->


  <script>
    /* =============================================
       QUIZ DATA
       Each question has:
         q  - question text
         for- whose perspective (0 = Partner A, 1 = Partner B, 2 = both)
         cat- category label
         opts - array of {text, score 1-5}
    ============================================= */
    const QUESTIONS = [
      {
        q: "When you're upset, how do you prefer to communicate?",
        for: 0, cat: "💬 Communication",
        opts: [
          { text: "Talk it through immediately", score: 5 },
          { text: "Need a little space first, then talk", score: 4 },

      {
        q: "How do you usually show love to someone you care about?",

          { text: "Words of affirmation & compliments", score: 5 },

          { text: "Acts of service & helping out", score: 4 },
          { text: "Physical touch & affection", score: 4 },
          { text: "Thoughtful gifts & surprises", score: 3 },

      {

          { text: "Big social gathering or party", score: 2 },
        ]
      },
      {

        opts: [
          { text: "Address it calmly and directly", score: 5 },

          { text: "Try to keep the peace and let it go", score: 3 },
          { text: "Get heated but resolve it quickly", score: 2 },
        ]
      },
      {
        q: "How important is alone time to you in a relationship?",
        for: 0, cat: "🧘 Independence",
        opts: [
          { text: "Very important — I need my own space", score: 5 },
          { text: "Moderately important", score: 4 },
          { text: "Nice but not essential", score: 3 },
          { text: "Not really — I love constant togetherness", score: 2 },
        ]
      },
      {
        q: "Where do you picture yourself in 5 years?",
        for: 0, cat: "🌟 Future Goals",
        opts: [
          { text: "Settled, stable, building a home", score: 5 },
          { text: "Career-focused with a loving relationship", score: 4 },
          { text: "Traveling and experiencing the world", score: 3 },
          { text: "Still figuring it out — living freely", score: 2 },
        ]
      },

      // --- Partner B questions ---
      {
        q: "When you're upset, how do you prefer to communicate?",
        for: 1, cat: "💬 Communication",
        opts: [
          { text: "Talk it through immediately", score: 5 },
          { text: "Need a little space first, then talk", score: 4 },
          { text: "Write down my feelings first", score: 3 },
          { text: "Wait until I've calmed completely", score: 2 },
        ]
      },
      {
        q: "How do you usually show love to someone you care about?",
        for: 1, cat: "💗 Love Language",
        opts: [
          { text: "Words of affirmation & compliments", score: 5 },
          { text: "Quality time together", score: 5 },
          { text: "Acts of service & helping out", score: 4 },
          { text: "Physical touch & affection", score: 4 },
          { text: "Thoughtful gifts & surprises", score: 3 },
        ]
      },
      {
        q: "Your ideal Friday night looks like…",
        for: 1, cat: "🌙 Lifestyle",
        opts: [
          { text: "Quiet night in, cozy & calm", score: 5 },
          { text: "Small dinner with close friends", score: 4 },
          { text: "Out exploring — dinner, show, anything", score: 3 },
          { text: "Big social gathering or party", score: 2 },
        ]
      },
      {
        q: "When a disagreement arises, you typically…",
        for: 1, cat: "⚡ Conflict",
        opts: [
          { text: "Address it calmly and directly", score: 5 },
          { text: "Take time to think, then discuss", score: 4 },
          { text: "Try to keep the peace and let it go", score: 3 },
          { text: "Get heated but resolve it quickly", score: 2 },
        ]
      },
      {
        q: "How important is alone time to you in a relationship?",
        for: 1, cat: "🧘 Independence",
        opts: [
          { text: "Very important — I need my own space", score: 5 },
          { text: "Moderately important", score: 4 },
          { text: "Nice but not essential", score: 3 },
          { text: "Not really — I love constant togetherness", score: 2 },
        ]
      },
      {
        q: "Where do you picture yourself in 5 years?",
        for: 1, cat: "🌟 Future Goals",
        opts: [
          { text: "Settled, stable, building a home", score: 5 },
          { text: "Career-focused with a loving relationship", score: 4 },
          { text: "Traveling and experiencing the world", score: 3 },
          { text: "Still figuring it out — living freely", score: 2 },
        ]
      },
    ];

    const CATEGORIES = ["💬 Communication", "💗 Love Language", "🌙 Lifestyle", "⚡ Conflict", "🧘 Independence", "🌟 Future Goals"];

    /* =============================================
       STATE
    ============================================= */
    let nameA = '', nameB = '';
    let currentQ = 0;
    let selectedIdx = null;
    // scores[0] = Partner A answers (index per category pair)
    // scores[1] = Partner B answers
    let scoresA = [], scoresB = [];

    /* =============================================
       FLOATING HEARTS INIT
    ============================================= */
    (function spawnHearts() {
      const container = document.getElementById('hearts-bg');
      const hearts = ['💕','💗','💖','🌸','✨','💫','🌹'];
      for (let i = 0; i < 18; i++) {
        const el = document.createElement('div');
        el.className = 'heart-particle';
        el.textContent = hearts[Math.floor(Math.random() * hearts.length)];
        el.style.cssText = `
          left: ${Math.random() * 100}%;
          font-size: ${.7 + Math.random() * 1.2}rem;
          animation-duration: ${8 + Math.random() * 12}s;
          animation-delay: ${Math.random() * 12}s;
        `;
        container.appendChild(el);
      }
    })();

    /* =============================================
       SCREEN MANAGER
    ============================================= */
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      const el = document.getElementById(id);
      el.classList.add('active');
    }

    /* =============================================
       START TEST
    ============================================= */
    function startTest() {
      nameA = document.getElementById('name-a').value.trim() || 'Partner A';
      nameB = document.getElementById('name-b').value.trim() || 'Partner B';
      scoresA = []; scoresB = [];
      currentQ = 0;
      selectedIdx = null;
      renderQuestion();
      showScreen('screen-quiz');
    }

    /* =============================================
       RENDER QUESTION
    ============================================= */
    function renderQuestion() {
      const q = QUESTIONS[currentQ];
      const total = QUESTIONS.length;

      // Progress
      document.getElementById('q-count').textContent = `Question ${currentQ + 1} of ${total}`;
      document.getElementById('q-category').textContent = q.cat;
      document.getElementById('progress-fill').style.width = `${((currentQ) / total) * 100}%`;

      // Partner label
      const isA = q.for === 0;
      const pName = isA ? nameA : nameB;
      const pIcon = isA ? '✨' : '🌹';
      document.getElementById('q-for').textContent = `For ${pName} ${pIcon}`;

      // Question
      document.getElementById('q-text').textContent = q.q;

      // Options
      const list = document.getElementById('options-list');
      list.innerHTML = '';
      q.opts.forEach((opt, i) => {
        const li = document.createElement('li');
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt.text;
        btn.onclick = () => selectOption(i, btn);
        li.appendChild(btn);
        list.appendChild(li);
      });

      selectedIdx = null;
      document.getElementById('btn-next').disabled = true;
    }

    /* =============================================
       SELECT OPTION
    ============================================= */
    function selectOption(idx, btn) {
      document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedIdx = idx;
      document.getElementById('btn-next').disabled = false;
    }

    /* =============================================
       NEXT STEP
    ============================================= */
    function nextStep() {
      if (selectedIdx === null) return;
      const q = QUESTIONS[currentQ];
      const score = q.opts[selectedIdx].score;

      if (q.for === 0) scoresA.push(score);
      else             scoresB.push(score);

      currentQ++;
      if (currentQ < QUESTIONS.length) {
        renderQuestion();
      } else {
        runLoading();
      }
    }

    /* =============================================
       LOADING ANIMATION
    ============================================= */
    const LOADING_MSGS = [
      "Reading the stars… ✨",
      "Consulting the cosmos… 🌌",
      "Weaving your story… 💫",
      "Measuring heartbeats… 💓",
      "Almost there… 🌹"
    ];

    function runLoading() {
      showScreen('screen-loading');
      let i = 0;
      const el = document.getElementById('loading-msg');
      el.textContent = LOADING_MSGS[0];
      const interval = setInterval(() => {
        i++;
        if (i < LOADING_MSGS.length) el.textContent = LOADING_MSGS[i];
      }, 700);
      setTimeout(() => {
        clearInterval(interval);
        buildResults();
        showScreen('screen-results');
        animateResults();
        spawnSparkles();
      }, 3500);
    }

    /* =============================================
       BUILD RESULTS
    ============================================= */
    function buildResults() {
      // Category labels (A has 6, B has 6)
      const catNames = ["Communication", "Love Language", "Lifestyle", "Conflict", "Independence", "Future Goals"];

      // Calculate per-category compatibility
      // Each category: max possible = 5+5 = 10. We compare A vs B score.
      // Compatibility per cat = 1 - |scoreA - scoreB| / 4  → 0..1
      const catCompat = [];
      for (let i = 0; i < 6; i++) {
        const diff = Math.abs((scoresA[i] || 3) - (scoresB[i] || 3));
        catCompat.push(Math.round((1 - diff / 4) * 100));
      }

      const overall = Math.round(catCompat.reduce((a, b) => a + b, 0) / catCompat.length);

      // Store for sharing
      window._lastResult = { nameA, nameB, overall };

      // Couple names
      document.getElementById('couple-names-display').textContent = `${nameA} & ${nameB}`;

      // Ring score fill (circumference = 2π×68 ≈ 427)
      const offset = 427 - (427 * overall / 100);
      const ring = document.getElementById('ring-fill');
      ring.style.strokeDashoffset = '427'; // reset first

      // Color by score
      let strokeColor, badgeClass, title, msg;
      if (overall >= 80) {
        strokeColor = 'url(#ringGrad1)'; badgeClass = 'badge-perfect';
        title = 'Perfect Match 💖';
        msg = `${nameA} and ${nameB} share a rare and beautiful bond. Your values, rhythms, and hearts align in ways most people only dream of. Cherish it.`;
      } else if (overall >= 60) {
        strokeColor = 'url(#ringGrad2)'; badgeClass = 'badge-strong';
        title = 'Strong Connection 💕';
        msg = `There's real depth between ${nameA} and ${nameB}. You complement each other well — with a little patience and curiosity, this connection can flourish beautifully.`;
      } else if (overall >= 40) {
        strokeColor = 'url(#ringGrad3)'; badgeClass = 'badge-effort';
        title = 'Needs Effort 💛';
        msg = `Love is a practice, not a given. ${nameA} and ${nameB} have potential, but growth requires honest conversations and a willingness to meet each other halfway.`;
      } else {
        strokeColor = 'url(#ringGrad4)'; badgeClass = 'badge-opposite';
        title = 'Opposites Attract? ❤️‍🔥';
        msg = `${nameA} and ${nameB} are wonderfully different. That tension can be electric — or challenging. The key is deciding together if your differences are complementary or conflicting.`;
      }

      // Inject SVG gradient defs
      const svg = document.querySelector('.score-ring-svg');
      svg.innerHTML = `
        <defs>
          <linearGradient id="ringGrad1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#e8637a"/><stop offset="100%" stop-color="#9b6fc8"/></linearGradient>
          <linearGradient id="ringGrad2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#9b6fc8"/><stop offset="100%" stop-color="#c874d5"/></linearGradient>
          <linearGradient id="ringGrad3" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#f7c44c"/><stop offset="100%" stop-color="#f48c60"/></linearGradient>
          <linearGradient id="ringGrad4" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#f48c60"/><stop offset="100%" stop-color="#e85555"/></linearGradient>
        </defs>
        <circle class="score-ring-track" cx="80" cy="80" r="68"/>
        <circle class="score-ring-fill" id="ring-fill" cx="80" cy="80" r="68"
                stroke="${strokeColor}" stroke-dasharray="427" stroke-dashoffset="427"/>
      `;

      document.getElementById('score-pct').textContent = overall + '%';
      const badge = document.getElementById('score-badge');
      badge.className = 'score-badge ' + badgeClass;
      badge.textContent = overall >= 80 ? 'Perfect Match' : overall >= 60 ? 'Strong Connection' : overall >= 40 ? 'Needs Effort' : 'Opposites Attract';
      document.getElementById('result-title').textContent = title;
      document.getElementById('result-msg').textContent = msg;

      // Breakdown bars
      const colors = ['#e8637a','#9b6fc8','#f48c60','#64b5f6','#81c784','#ffb74d'];
      const barsHtml = catNames.map((name, i) => `
        <div class="bd-row">
          <div class="bd-meta"><span>${name}</span><span>${catCompat[i]}%</span></div>
          <div class="bd-track"><div class="bd-fill" data-width="${catCompat[i]}" style="width:0%;background:${colors[i]}"></div></div>
        </div>
      `).join('');
      document.getElementById('breakdown-bars').innerHTML = barsHtml;

      // Store offset for animation
      window._ringOffset = offset;
    }

    /* =============================================
       ANIMATE RESULTS
    ============================================= */
    function animateResults() {
      // Ring fill
      setTimeout(() => {
        const ring = document.getElementById('ring-fill');
        if (ring) ring.style.strokeDashoffset = window._ringOffset;
      }, 200);

      // Count up score
      const target = parseInt(document.getElementById('score-pct').textContent);
      let current = 0;
      document.getElementById('score-pct').textContent = '0%';
      const step = Math.ceil(target / 60);
      const counter = setInterval(() => {
        current = Math.min(current + step, target);
        document.getElementById('score-pct').textContent = current + '%';
        if (current >= target) clearInterval(counter);
      }, 22);

      // Breakdown bars
      setTimeout(() => {
        document.querySelectorAll('.bd-fill').forEach((el, i) => {
          setTimeout(() => { el.style.width = el.dataset.width + '%'; }, i * 120);
        });
      }, 600);
    }

    /* =============================================
       SPARKLE BURST
    ============================================= */
    function spawnSparkles() {
      const emojis = ['✨','💖','🌸','💫','🌹','💕','⭐'];
      for (let i = 0; i < 14; i++) {
        setTimeout(() => {
          const el = document.createElement('div');
          el.className = 'sparkle';
          el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
          el.style.cssText = `
            left: ${20 + Math.random() * 60}%;
            top:  ${20 + Math.random() * 50}%;
          `;
          document.body.appendChild(el);
          setTimeout(() => el.remove(), 900);
        }, i * 60);
      }
    }

    /* =============================================
       SHARE RESULT
    ============================================= */
    function shareResult() {
      const r = window._lastResult;
      if (!r) return;
      const text = `💖 Love Compatibility Test\n${r.nameA} & ${r.nameB} scored ${r.overall}% compatible!\nTake the test at: ${location.href}`;

      if (navigator.share) {
        navigator.share({ title: 'Love Compatibility Test', text }).catch(() => copyFallback(text));
      } else {
        copyFallback(text);
      }
    }

    function copyFallback(text) {
      navigator.clipboard.writeText(text).then(showToast).catch(() => {
        // Manual fallback
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        ta.remove();
        showToast();
      });
    }

    function showToast() {
      const t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2600);
    }

    /* =============================================
       RESET TEST
    ============================================= */
    function resetTest() {
      currentQ = 0; selectedIdx = null; scoresA = []; scoresB = [];
      document.getElementById('name-a').value = '';
      document.getElementById('name-b').value = '';
      showScreen('screen-intro');
    }

    /* =============================================
       ENTER KEY support on intro
    ============================================= */
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const active = document.querySelector('.screen.active');
        if (active.id === 'screen-intro') startTest();
        else if (active.id === 'screen-quiz' && !document.getElementById('btn-next').disabled) nextStep();
      }
    });
  </script>
</body>
</html>
